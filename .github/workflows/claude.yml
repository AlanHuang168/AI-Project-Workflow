name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.body, '@claude'))

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_commit_signing: true
          # Author commits as the repository owner, matching how local
          # Claude Code commits look. Claude is credited through the
          # "Co-Authored-By: Claude <noreply@anthropic.com>" trailer required
          # by CLAUDE.md, which attributes the official `claude` account
          # (no [bot] suffix) in the Contributors graph.
          # Note: the action's default bot_id (41898282) is github-actions[bot],
          # which misattributes commits - always set bot_id/bot_name explicitly.
          bot_id: "5227952"
          bot_name: "AlanHuang168"